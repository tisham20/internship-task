<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advertise</title>
    <style>
        body {
            font-family: 'Times New Roman', serif;
            margin: 0;
            padding: 0;
            background-color: #f9f9f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .coupon {
            width: 500px;
            border: 4px dotted #333;
            margin: 50px auto;
            background-color: #fff;
            border-radius: 7px;
            overflow: hidden; 
            box-shadow: 0px 4px 8px rgba(0, 0, 0, 0.2);
        }
        .top-section {
            background-color: #f3f3f3;
            padding: 20px;
            text-align: center;
            font-weight: bold;
            font-size: 22px;
        }
        .coupon img {
            width: 100%;
            height: auto;
            display: block; 
        }
        .coupon h3 {
            font-size: 22px;
            font-weight: bold;
            margin: 15px;
            text-align: center;
            color: #d32f2f;
        }
        .coupon p {
            font-size: 16px;
            text-align: center;
            line-height: 1.4;
            margin: 15px;
            color: #444;
        }
        .bottom-section {
            background-color: #f8f3f3;
            padding: 20px;
            text-align: center;
        }
        .promo {
            font-size: 18px;
            font-weight: bold;
            margin: 0;
        }
        .promo span {
            background-color: #d32f2f;
            color: white;
            padding: 5px 10px;
            border-radius: 5px;
        }
        .expires {
            color: red;
            font-size: 16px;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="coupon">
        <div class="top-section">
            Company Logo
        </div>
        <img src="images/burger.jpg" alt="Food Image">
        <h3>20% OFF YOUR PURCHASE</h3>
        <p>
            Enjoy a delicious meal at an amazing discount! Get 20% off your total purchase with this special promo.
            Hurry, offer valid for a limited time only!
        </p>
        <div class="bottom-section">
            <p class="promo">Use Promo Code: <span>BOH232</span></p>
            <p class="expires">Expires: Jan 03, 2025</p>
        </div>
    </div>
</body>
</html>
